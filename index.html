<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC Service Call Notes</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #4A90D9;
            margin-bottom: 24px;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 20px;
        }

        @media (max-width: 700px) {
            .sections { grid-template-columns: 1fr; }
        }

        .section {
            background: #1f2937;
            border-radius: 10px;
            padding: 18px;
            border: 1px solid #1a3a5c;
        }

        .section h2 {
            color: #4A90D9;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a3a5c;
        }

        .field { margin-bottom: 12px; }

        .field label {
            display: block;
            font-size: 0.72rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 7px 10px;
            background: #111827;
            border: 1px solid #1a3a5c;
            color: #e5e7eb;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4A90D9;
        }

        select option { background: #1f2937; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
        }

        .toggle-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4A90D9;
        }

        .toggle-row label {
            font-size: 0.85rem;
            color: #d1d5db;
            cursor: pointer;
        }

        .output-wrap {
            max-width: 1000px;
            margin: 0 auto 16px;
            background: #1f2937;
            border-radius: 10px;
            padding: 18px;
            border: 1px solid #1a3a5c;
        }

        .output-wrap h2 {
            color: #4A90D9;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        #noteOutput {
            background: #0f172a;
            border: 1px solid #1a3a5c;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
            line-height: 1.75;
            color: #cbd5e1;
            white-space: pre-wrap;
            min-height: 100px;
        }

        .buttons {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        button {
            padding: 11px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.15s;
        }

        .btn-copy { background: #CC0000; color: #ffffff; }
        .btn-copy:hover { background: #E53935; }
        .btn-copy.copied { background: #4ade80; color: #0f172a; }
        .btn-reset { background: #1a3a5c; color: #e5e7eb; }
        .btn-reset:hover { background: #4b5563; }
    </style>
</head>

            <select id="in_location">

                <option value="crawlspace">Crawlspace</option>
                <option value="basement">Basement</option>
                <option value="garage">Garage</option>
                <option value="closet">Closet</option>
                <option value="utility room">Utility Room</option>
            </select>
        </div>

        <div class="field">
            <label>Filter Location</label>
            <select id="in_filter_loc">
                <option value="at unit">At Unit</option>
                <option value="at the return grille">At Return Grille</option>
                <option value="in the base">In Base</option>
                <option value="in the ceiling">In Ceiling</option>
            </select>
        </div>

        <div class="field-row">
            <div class="field">
                <label>Filter Size</label>
                <input type="text" id="in_filter_size" placeholder="20x20x1">
            </div>
            <div class="field">
                <label>Filter Condition</label>
                <select id="in_filter_cond">
                    <option value="clean">Clean</option>
                    <option value="slightly dirty" selected>Slightly Dirty</option>
                    <option value="dirty">Dirty</option>
                    <option value="very dirty">Very Dirty</option>
                    <option value="clogged">Clogged</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Filter Action</label>
            <select id="in_filter_action">
                <option value="replaced">Replaced</option>
                <option value="left in place - within service life">Left in Place</option>
                <option value="customer to replace">Customer to Replace</option>
            </select>
        </div>

        <div class="field">
            <label>Indoor Coil Condition</label>
            <select id="in_coil">
                <option value="clean">Clean</option>
                <option value="slightly dirty">Slightly Dirty</option>
                <option value="chemically cleaned">Dirty - Chemically Cleaned</option>
                <option value="dirty and needs to be cleaned">Dirty - Needs Cleaning</option>
            </select>
        </div>

        <div class="field">
            <label>Blower Wheel Condition</label>
            <select id="in_blower">
                <option value="clean">Clean</option>
                <option value="slightly dirty">Slightly Dirty</option>
                <option value="chemically cleaned">Dirty - Chemically Cleaned</option>
                <option value="dirty and needs to be cleaned">Dirty - Needs Cleaning</option>
            </select>
        </div>

        <div class="toggle-row">
            <input type="checkbox" id="in_has_blower_cap" checked>
            <label for="in_has_blower_cap">Unit has blower capacitor</label>
        </div>

        <div id="in_blower_cap_fields">
            <div class="field-row">
                <div class="field">
                    <label>Blower Cap. Spec (MFD)</label>
                    <input type="text" id="in_cap_spec" placeholder="10">
                </div>
                <div class="field">
                    <label>Blower Cap. Measured</label>
                    <input type="text" id="in_cap_actual" placeholder="9.5">
                </div>
            </div>

            <div class="field">
                <label>Blower Cap. Status</label>
                <select id="in_cap_status">
                    <option value="in">In Spec</option>
                    <option value="out">Not In Spec</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Condensate Drain Type</label>
            <select id="in_drain">
                <option value="pvc">PVC Drain Line</option>
                <option value="pump">Condensate Pump</option>
            </select>
        </div>

        <div class="toggle-row" id="in_heatstrips_toggle">
            <input type="checkbox" id="in_heatstrips" checked>
            <label for="in_heatstrips">Were heat strips checked?</label>
        </div>

        <div class="field" id="in_heatstrips_field">
            <label>Heat Strips Status</label>
            <select id="in_heat_status">
                <option value="properly">Operating Properly</option>
                <option value="not properly">Not Operating Properly</option>
            </select>
        </div>

        <div class="field-row">
            <div class="field">
                <label>Temp Split Return (F)</label>
                <input type="text" id="in_temp_return" placeholder="78">
            </div>
            <div class="field">
                <label>Temp Split Supply (F)</label>
                <input type="text" id="in_temp_supply" placeholder="56">
            </div>
        </div>

        <div class="field">
            <label>Temp Split Status</label>
            <select id="in_temp_status">
                <option value="within">Within Specs</option>
                <option value="not within">Not Within Specs</option>
            </select>
        </div>

        <div class="field">
            <label>Additional Indoor Notes</label>
            <input type="text" id="in_notes" placeholder="Optional...">
        </div>
    </div>

    <!-- OUTDOOR -->
    <div class="section">
        <h2>Outdoor Unit</h2>

        <div class="field-row">
            <div class="field">
                <label>Year</label>
                <input type="text" id="out_year" placeholder="2024" maxlength="4">
            </div>
            <div class="field">
                <label>Brand</label>
                <select id="out_brand">
                    <option>Carrier</option>
                    <option>Trane</option>
                    <option>Lennox</option>
                    <option>Goodman</option>
                    <option>Rheem</option>
                    <option>York</option>
                    <option>American Standard</option>
                    <option>Bryant</option>
                    <option>Heil</option>
                    <option>Ruud</option>
                    <option>Amana</option>
                    <option>Daikin</option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div class="field">
                <label>Tonnage</label>
                <select id="out_tons">
                    <option>1</option>
                    <option>1.5</option>
                    <option selected>2</option>
                    <option>2.5</option>
                    <option>3</option>
                    <option>3.5</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </div>
            <div class="field">
                <label>Unit Type</label>
                <select id="out_type">
                    <option value="heat pump">Heat Pump</option>
                    <option value="straight AC">Straight AC</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Outdoor Coil Condition</label>
            <select id="out_coil">
                <option value="clean">Clean</option>
                <option value="slightly dirty">Slightly Dirty</option>
                <option value="chemically cleaned">Dirty - Chemically Cleaned</option>
                <option value="dirty and needs to be cleaned">Dirty - Needs Cleaning</option>
            </select>
        </div>

        <div class="field">
            <label>Contactor Status</label>
            <select id="out_contactor">
                <option value="properly">Operating Properly</option>
                <option value="not properly">Not Operating Properly</option>
                <option value="pitted">Pitted - Should Be Replaced</option>
            </select>
        </div>

        <div class="field-row">
            <div class="field">
                <label>Capacitor Spec (MFD)</label>
                <input type="text" id="out_cap_spec" placeholder="35/5">
            </div>
            <div class="field">
                <label>Capacitor Measured</label>
                <input type="text" id="out_cap_actual" placeholder="34.1/4.9">
            </div>
        </div>

        <div class="field">
            <label>Capacitor Status</label>
            <select id="out_cap_status">
                <option value="in">In Spec</option>
                <option value="out">Not In Spec</option>
            </select>
        </div>

        <div class="toggle-row" id="out_defrost_toggle">
            <input type="checkbox" id="out_defrost" checked>
            <label for="out_defrost">Was defrost checked?</label>
        </div>

        <div class="field" id="out_defrost_field">
            <label>Defrost Status</label>
            <select id="out_defrost_status">
                <option value="properly">Operating Properly</option>
                <option value="not properly">Not Operating Properly</option>
            </select>
        </div>

        <div class="field">
            <label>Refrigerant Test Mode</label>
            <select id="out_ref_mode">
                <option value="cooling">Cooling</option>
                <option value="heating">Heating</option>
            </select>
        </div>

        <div class="field">
            <label>Refrigerant Status</label>
            <select id="out_ref_status">
                <option value="within">Within Manufacturer Specifications</option>
                <option value="low">Low - System Needs Refrigerant</option>
                <option value="high">High - System is Overcharged</option>
            </select>
        </div>

        <div class="field">
            <label>Additional Outdoor Notes</label>
            <input type="text" id="out_notes" placeholder="Optional...">
        </div>
    </div>

</div>

<div class="output-wrap">
    <h2>Generated Note</h2>
    <div id="noteOutput"></div>
</div>

<div class="buttons">
    <button class="btn-copy" id="copyBtn" onclick="copyNote()">Copy to Clipboard</button>
    <button class="btn-reset" onclick="resetForm()">Clear Form</button>
</div>

<script>
    function v(id) { return document.getElementById(id).value.trim(); }
    function chk(id) { return document.getElementById(id).checked; }

    // Wire all inputs to regenerate note live
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('change', generateNote);
        el.addEventListener('input', generateNote);
    });

    document.getElementById('in_type').addEventListener('change', function () {
        const isFurnace = this.value === 'furnace';
        document.getElementById('in_tons_field').style.display = isFurnace ? 'none' : '';
        document.getElementById('in_btu_field').style.display = isFurnace ? '' : 'none';
        document.getElementById('in_coil_fields').style.display = isFurnace ? '' : 'none';
        document.getElementById('in_heatstrips_toggle').style.display = isFurnace ? 'none' : '';
        document.getElementById('in_heatstrips_field').style.display = isFurnace ? 'none' : '';
        if (isFurnace) {
            document.getElementById('in_heatstrips').checked = false;
        }
        generateNote();
    });

    document.getElementById('in_has_blower_cap').addEventListener('change', function () {
        document.getElementById('in_blower_cap_fields').style.display = this.checked ? '' : 'none';
        generateNote();
    });

    document.getElementById('in_heatstrips').addEventListener('change', function () {
        document.getElementById('in_heatstrips_field').style.display = this.checked ? '' : 'none';
        generateNote();
    });

    document.getElementById('out_defrost').addEventListener('change', function () {
        document.getElementById('out_defrost_field').style.display = this.checked ? '' : 'none';
        generateNote();
    });

    document.getElementById('out_type').addEventListener('change', function () {
        const isHP = this.value === 'heat pump';
        document.getElementById('out_defrost').checked = isHP;
        document.getElementById('out_defrost_field').style.display = isHP ? '' : 'none';
        document.getElementById('out_defrost_toggle').style.display = isHP ? '' : 'none';
        generateNote();
    });

    function generateNote() {
        // --- Indoor ---
        const inYear        = v('in_year')          || 'XXXX';
        const inBrand       = v('in_brand');
        const inTons        = v('in_tons');
        const inType        = v('in_type');
        const inConfig      = v('in_config');
        const inLocation    = v('in_location');
        const inFilterLoc   = v('in_filter_loc');
        const inFilterSize  = v('in_filter_size')   || '[FILTER SIZE]';
        const inFilterCond  = v('in_filter_cond');
        const inFilterAct   = v('in_filter_action');
        const inCoil        = v('in_coil');
        const inBlower      = v('in_blower');
        const inCapSpec     = v('in_cap_spec')       || '[SPEC]';
        const inCapActual   = v('in_cap_actual')     || '[ACTUAL]';
        const inCapStatus   = v('in_cap_status');
        const hasBlowerCap  = chk('in_has_blower_cap');
        const inDrain       = v('in_drain');
        const hasHeat       = chk('in_heatstrips');
        const inHeatSt      = v('in_heat_status');
        const inTempSup     = v('in_temp_supply')    || '[SUPPLY]';
        const inTempRet     = v('in_temp_return')    || '[RETURN]';
        const inTempSt      = v('in_temp_status');
        const inNotes       = v('in_notes');

        const isFurnace = inType === 'furnace';
        const inBtu = v('in_btu');
        const inCoilYear  = v('in_coil_year')  || 'XXXX';
        const inCoilBrand = v('in_coil_brand');
        const inCoilTons  = v('in_coil_tons');
        const inSize = isFurnace ? `${inBtu} BTU` : `${inTons} ton`;

        let indoor = '';
        if (isFurnace) {
            indoor += `${inYear} ${inBrand} ${inSize} ${inType} and ${inCoilYear} ${inCoilBrand} ${inCoilTons} ton indoor coil located in the ${inLocation} in ${inConfig} configuration. `;
        } else {
            indoor += `${inYear} ${inBrand} ${inSize} ${inType} located in the ${inLocation} in ${inConfig} configuration. `;
        }
        indoor += `System is filtered ${inFilterLoc} with a ${inFilterSize} filter that was ${inFilterCond} and was ${inFilterAct}. `;
        indoor += inCoil === 'chemically cleaned'
            ? `Indoor coil was inspected, found dirty, and was chemically cleaned. `
            : `Indoor coil was inspected and is ${inCoil}. `;
        indoor += inBlower === 'chemically cleaned'
            ? `Blower wheel was inspected, found dirty, and was chemically cleaned. `
            : `Blower wheel was inspected and is ${inBlower}. `;

        if (hasBlowerCap) {
            if (inCapStatus === 'in') {
                indoor += `Blower capacitor is a ${inCapSpec} MFD and measured ${inCapActual} and is in spec. `;
            } else {
                indoor += `Blower capacitor is a ${inCapSpec} MFD and measured ${inCapActual} and is not in spec and should be replaced for continuous operation. `;
            }
        }

        indoor += inDrain === 'pump'
            ? `Condensate pump was cleaned out, tested for operation, and treated with drain tablets. `
            : `PVC condensate drain line was flushed and treated with drain tablets. `;

        if (hasHeat) {
            indoor += inHeatSt === 'properly'
                ? `Electric heat strips were tested for operation and are operating properly. `
                : `Electric heat strips were tested for operation and are not operating properly. `;
        }

        indoor += `System has a ${inTempRet}-${inTempSup} temperature split and is ${inTempSt} specs.`;

        if (inNotes) indoor += ` ${inNotes}`;

        // --- Outdoor ---
        const outYear       = v('out_year')         || 'XXXX';
        const outBrand      = v('out_brand');
        const outTons       = v('out_tons');
        const outType       = v('out_type');
        const outCoil       = v('out_coil');
        const outContactor  = v('out_contactor');
        const outCapSpec    = v('out_cap_spec')      || '[SPEC]';
        const outCapActual  = v('out_cap_actual')    || '[ACTUAL]';
        const outCapStatus  = v('out_cap_status');
        const hasDefrost    = chk('out_defrost');
        const outDefrostSt  = v('out_defrost_status');
        const outRefMode    = v('out_ref_mode');
        const outRefStatus  = v('out_ref_status');
        const outNotes      = v('out_notes');

        let outdoor = '';
        outdoor += `${outYear} ${outBrand} ${outTons} ton ${outType}. `;
        outdoor += outCoil === 'chemically cleaned'
            ? `Outdoor coil was inspected, found dirty, and was chemically cleaned. `
            : `Outdoor coil was inspected and is ${outCoil}. `;

        if (outContactor === 'properly') {
            outdoor += `Contactor was tested for operation and is operating properly. `;
        } else if (outContactor === 'not properly') {
            outdoor += `Contactor was tested for operation and is not operating properly. `;
        } else {
            outdoor += `Contactor was inspected and is pitted and should be replaced. `;
        }

        if (outCapStatus === 'in') {
            outdoor += `Capacitor is a ${outCapSpec} MFD and measured ${outCapActual} MFD and is in spec. `;
        } else {
            outdoor += `Capacitor is a ${outCapSpec} MFD and measured ${outCapActual} MFD and is not in spec and should be replaced. `;
        }

        if (hasDefrost) {
            outdoor += outDefrostSt === 'properly'
                ? `Defrost was tested and is operating properly. `
                : `Defrost was tested and is not operating properly. `;
        }

        if (outRefStatus === 'within') {
            outdoor += `Refrigerant pressures were tested in ${outRefMode} and are within manufacturer specifications.`;
        } else if (outRefStatus === 'low') {
            outdoor += `Refrigerant pressures were tested in ${outRefMode} and are not within manufacturer specifications. System is low on refrigerant.`;
        } else {
            outdoor += `Refrigerant pressures were tested in ${outRefMode} and are not within manufacturer specifications. System is overcharged.`;
        }

        if (outNotes) outdoor += ` ${outNotes}`;

        document.getElementById('noteOutput').textContent =
            `Indoor\n\n${indoor}\n\nOutdoor\n\n${outdoor}`;
    }

    function copyNote() {
        const text = document.getElementById('noteOutput').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy to Clipboard';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    function resetForm() {
        document.querySelectorAll('input[type="text"]').forEach(el => el.value = '');
        document.getElementById('in_heatstrips').checked = true;
        document.getElementById('in_heatstrips_field').style.display = '';
        document.getElementById('out_defrost').checked = true;
        document.getElementById('out_defrost_field').style.display = '';
        document.getElementById('out_defrost_toggle').style.display = '';
        generateNote();
    }

    // Generate on load
    generateNote();
</script>
</body>
</html>
